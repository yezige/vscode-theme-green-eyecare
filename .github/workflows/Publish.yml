name: Publish

on:
  push:
    tags:
      - "**"
      - "!**-alpha"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # RELEASE_TAG: v0.0.1
      # RELEASE_VERSION: 0.0.1
      - name: Set env
        run: |
          echo "RELEASE_TAG=${GITHUB_REF##*/}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${GITHUB_REF##*/v}" >> $GITHUB_ENV

      - uses: lannonbr/vsce-action@4.0.0
        with:
          args: "publish -p $VSCE_TOKEN && vsce package"
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Package
        id: package
        run: |
          zip vscode-theme-green-eyecare-${{ env.RELEASE_VERSION }}.zip *.vsix
          ls -al
          echo "filename=vscode-theme-green-eyecare-${{ env.RELEASE_VERSION }}.zip" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ steps.package.outputs.filename }}
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
